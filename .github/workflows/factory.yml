name: factory

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up OpenShift CLI
        uses: redhat-actions/oc-installer@v1
        with:
          version: latest

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pyyaml

      - name: Install runner dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Detect changed clusters
        id: clusters
        run: |
          chmod +x scripts/detect_changed_clusters.sh
          CHANGED="$(scripts/detect_changed_clusters.sh origin/${{ github.base_ref }} HEAD)"
          {
            echo 'changed<<EOF'
            echo "$CHANGED"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Terraform fmt
        run: terraform fmt -recursive -check

      - name: Validate changed clusters
        env:
          TF_VAR_ocm_token: dummy
        run: |
          chmod +x scripts/run_cluster_workflow.sh
          mkdir -p .artifacts/pr
          while IFS= read -r stack; do
            [ -z "$stack" ] && continue
            scripts/run_cluster_workflow.sh \
              --cluster-dir "$stack" \
              --artifact-dir ".artifacts/pr/${stack//\//_}" \
              --mode validate \
              --backend false
          done <<< "${{ steps.clusters.outputs.changed }}"

      - name: Upload PR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-rendered-configs
          path: .artifacts/pr

  apply:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up OpenShift CLI
        uses: redhat-actions/oc-installer@v1
        with:
          version: latest

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pyyaml

      - name: Install runner dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Detect changed clusters
        id: clusters
        run: |
          chmod +x scripts/detect_changed_clusters.sh
          CHANGED="$(scripts/detect_changed_clusters.sh HEAD~1 HEAD)"
          {
            echo 'changed<<EOF'
            echo "$CHANGED"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Apply changed clusters
        env:
          TF_VAR_ocm_token: ${{ secrets.OCM_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          chmod +x scripts/run_cluster_workflow.sh
          mkdir -p .artifacts/apply
          while IFS= read -r stack; do
            [ -z "$stack" ] && continue
            scripts/run_cluster_workflow.sh \
              --cluster-dir "$stack" \
              --artifact-dir ".artifacts/apply/${stack//\//_}" \
              --mode apply \
              --backend true
          done <<< "${{ steps.clusters.outputs.changed }}"

      - name: Upload apply artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apply-rendered-configs
          path: .artifacts/apply
