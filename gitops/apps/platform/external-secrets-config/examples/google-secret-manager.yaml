enabled: true
config:
  name: cluster
  external_secrets_namespace: external-secrets
  refresh_interval: 1h
  cluster_secret_stores:
  - name: platform-secrets
    spec:
      provider:
        gcpsm:
          projectID: my-gcp-project
          auth:
            secretRef:
              secretAccessKeySecretRef:
                name: google-secret-manager-auth
                key: secret-access-credentials
