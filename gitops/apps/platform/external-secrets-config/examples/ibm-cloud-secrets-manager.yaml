enabled: true
config:
  name: cluster
  external_secrets_namespace: external-secrets
  refresh_interval: 1h
  cluster_secret_stores:
  - name: platform-secrets
    spec:
      provider:
        ibm:
          serviceUrl: https://<region>.secrets-manager.appdomain.cloud
          auth:
            secretRef:
              secretApiKeySecretRef:
                name: ibm-cloud-secrets-manager-auth
                key: apiKey
