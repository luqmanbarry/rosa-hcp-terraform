apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: platform-secrets
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-2
      # Optional: assume a narrower IAM role before reading secrets.
      role: arn:aws:iam::123456789012:role/external-secrets-reader
      auth:
        jwt:
          serviceAccountRef:
            name: eso-aws
            namespace: external-secrets-operator
