apiVersion: config.openshift.io/v1
kind: Image
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  additionalTrustedCA:
    name: {{ .Values.registriesCertsConfigMap }}
  registrySources:
    allowedRegistries:
{{- range .Values.allowList }}
      - {{ . }}
{{- end }}

