globalSecretStoreRef:
  name: platform-secrets
  kind: ClusterSecretStore

externalSecrets:
  - name: prometheus-remote-write
    refreshInterval: 1h
    target:
      name: prometheus-remote-write
      creationPolicy: Owner
    data:
      - secretKey: token
        remoteRef:
          key: platform/monitoring/remote-write
          property: token

userWorkloadMonitoring:
  remoteWrite:
    enabled: true
    url: https://metrics.example.com/api/v1/write
    secretName: prometheus-remote-write

