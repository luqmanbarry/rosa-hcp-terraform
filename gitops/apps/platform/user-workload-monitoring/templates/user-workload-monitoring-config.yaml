apiVersion: v1
kind: ConfigMap
metadata:
  name: user-workload-monitoring-config
  namespace: openshift-user-workload-monitoring
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
data:
  config.yaml: |-
    prometheus:
      retention: "{{ .Values.userWorkloadMonitoring.prometheus.retention }}"
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: "{{ .Values.userWorkloadMonitoring.prometheus.storageCapacity }}"
          storageClassName: "{{ .Values.userWorkloadMonitoring.prometheus.storageClassName }}"
          volumeMode: "{{ .Values.userWorkloadMonitoring.prometheus.volumeMode }}"
      {{- if .Values.userWorkloadMonitoring.remoteWrite.enabled }}
      remoteWrite:
        - url: "{{ required "userWorkloadMonitoring.remoteWrite.url is required when remoteWrite.enabled=true" .Values.userWorkloadMonitoring.remoteWrite.url }}"
          authorization:
            credentials:
              name: "{{ required "userWorkloadMonitoring.remoteWrite.secretName is required when remoteWrite.enabled=true" .Values.userWorkloadMonitoring.remoteWrite.secretName }}"
              key: token
      {{- end }}
    alertmanager:
      enabled: {{ .Values.userWorkloadMonitoring.alertmanager.enabled }}
      enableAlertmanagerConfig: {{ .Values.userWorkloadMonitoring.alertmanager.enableAlertmanagerConfig }}
    thanosRuler:
      retention: "{{ .Values.userWorkloadMonitoring.thanosRuler.retention }}"
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: "{{ .Values.userWorkloadMonitoring.thanosRuler.storageCapacity }}"
          storageClassName: "{{ .Values.userWorkloadMonitoring.thanosRuler.storageClassName }}"
          volumeMode: "{{ .Values.userWorkloadMonitoring.thanosRuler.volumeMode }}"
    prometheusOperator:
{{ toYaml .Values.userWorkloadMonitoring.prometheusOperator | indent 6 }}
