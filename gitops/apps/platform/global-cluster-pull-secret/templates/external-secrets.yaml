# ExternalSecret examples for this chart
#
# Default example: AWS Secrets Manager
#
# imageRegistry:
#   globalPullSecret:
#     externalSecrets:
#       - name: additional-pull-secret
#         namespace: openshift-gitops
#         refreshInterval: 1h
#         secretStoreRef:
#           name: platform-secrets
#           kind: ClusterSecretStore
#         target:
#           name: additional-pull-secret
#           creationPolicy: Owner
#           template:
#             type: kubernetes.io/dockerconfigjson
#         data:
#           - secretKey: .dockerconfigjson
#             remoteRef:
#               key: platform/cluster-01/image-registry/pull-secret
#               property: dockerconfigjson
#
# Other provider examples:
# - IBM Cloud Secrets Manager:
#   remoteRef.key should match the IBM secret identifier
# - AWS Secrets Manager:
#   remoteRef.key should match the AWS secret name or ARN
# - Azure Key Vault:
#   remoteRef.key should match the Azure Key Vault secret name
# - Google Secret Manager:
#   remoteRef.key should match the Google Secret Manager secret name
# - CyberArk Conjur:
#   remoteRef.key should match the Conjur variable path
#
# All examples should reuse the shared ClusterSecretStore name from:
# external-secrets-config
{{- $imageRegistry := .Values.imageRegistry | default dict }}
{{- $pullSecret := $imageRegistry.globalPullSecret | default dict }}
{{- if $pullSecret.enabled }}
{{- range $externalSecret := $pullSecret.externalSecrets | default list }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $externalSecret.name }}
  namespace: {{ $externalSecret.namespace | default $pullSecret.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ $externalSecret.refreshInterval | default $pullSecret.refresh_interval | quote }}
  secretStoreRef:
    name: {{ $externalSecret.secretStoreRef.name }}
    kind: {{ $externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $externalSecret.target.name }}
{{- with $externalSecret.target.creationPolicy }}
    creationPolicy: {{ . }}
{{- end }}
{{- with $externalSecret.target.deletionPolicy }}
    deletionPolicy: {{ . }}
{{- end }}
{{- with $externalSecret.target.template }}
    template:
{{ toYaml . | indent 6 }}
{{- end }}
{{- if $externalSecret.data }}
  data:
{{ toYaml $externalSecret.data | indent 4 }}
{{- end }}
{{- if $externalSecret.dataFrom }}
  dataFrom:
{{ toYaml $externalSecret.dataFrom | indent 4 }}
{{- end }}
{{- end }}
{{- end }}
