{{- if .Values.createReviewerTokenSecret }}
# Legacy fallback only. Prefer TokenRequest-issued bound tokens for reviewer auth.
apiVersion: v1
kind: Secret
metadata:
  annotations:
    kubernetes.io/service-account.name: {{ .Values.serviceAccountName }}
  name: {{ .Values.serviceAccountName }}
  namespace: {{ .Values.namespace }}
type: kubernetes.io/service-account-token
{{- end }}
