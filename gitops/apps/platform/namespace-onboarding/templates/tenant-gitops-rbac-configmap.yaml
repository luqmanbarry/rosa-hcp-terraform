{{- if .Values.tenantGitOps.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: {{ .Values.tenantGitOps.namespace }}
data:
  policy.default: {{ .Values.tenantGitOps.rbac.defaultPolicy | quote }}
  scopes: {{ .Values.tenantGitOps.rbac.scopes | quote }}
{{- end }}
