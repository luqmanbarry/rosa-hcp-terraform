{{- range $ns := .Values.namespaces }}
{{- range $binding := $ns.roleBindings }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ default (printf "%s-binding" $binding.role) $binding.name }}
  namespace: {{ $ns.name }}
subjects:
{{- if $binding.subjects }}
{{ toYaml $binding.subjects | indent 2 }}
{{- else if $binding.group }}
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: {{ $binding.group }}
{{- else if $binding.serviceAccount }}
  - kind: ServiceAccount
    name: {{ $binding.serviceAccount.name }}
    namespace: {{ default $ns.name $binding.serviceAccount.namespace }}
{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $binding.role }}
{{- end }}
{{- end }}
