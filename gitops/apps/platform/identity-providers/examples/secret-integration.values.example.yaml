globalSecretStoreRef:
  name: platform-secrets
  kind: ClusterSecretStore

oauth:
  identityProviders:
    - name: example-oidc
      mappingMethod: claim
      type: OpenID
      openID:
        clientID: example-client-id
        clientSecretSecretName: oauth-client-secret
        issuer: https://idp.example.com/realms/platform
        claims:
          preferredUsername:
            - preferred_username
          name:
            - name
          email:
            - email

externalSecrets:
  - name: oauth-client-secret
    refreshInterval: 1h
    target:
      name: oauth-client-secret
      creationPolicy: Owner
    data:
      - secretKey: clientSecret
        remoteRef:
          key: secret/data/platform/identity/example-oidc
          property: clientSecret

