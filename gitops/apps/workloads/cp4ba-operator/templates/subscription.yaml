apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: {{ .Values.subscriptionName }}
  namespace: {{ .Values.namespace }}
spec:
  channel: {{ .Values.channel }}
  installPlanApproval: {{ .Values.installPlanApproval }}
  name: {{ .Values.packageName }}
  source: {{ .Values.catalogSource.name }}
  sourceNamespace: {{ .Values.catalogSource.namespace }}
{{- if .Values.startingCSV }}
  startingCSV: {{ .Values.startingCSV }}
{{- end }}
