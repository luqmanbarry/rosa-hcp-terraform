apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: {{ .Values.subscriptionName }}
  namespace: {{ .Values.namespace }}
spec:
  targetNamespaces:
{{- if .Values.targetNamespaces }}
{{ toYaml .Values.targetNamespaces | indent 4 }}
{{- else }}
    - {{ .Values.namespace }}
{{- end }}
