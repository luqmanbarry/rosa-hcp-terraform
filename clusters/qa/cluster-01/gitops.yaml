applications:
  - name: self-provisioner
    namespace: openshift-config
    path: gitops/apps/platform/self-provisioner
    syncWave: "10"
    helmValues: |
      disableSelfProvisioner: true
      clusterAdminEmail: cluster-admins@example.com
  - name: user-workload-monitoring
    namespace: openshift-monitoring
    path: gitops/apps/platform/user-workload-monitoring
    syncWave: "20"
    helmValues: |
      clusterMonitoring:
        enableUserWorkload: true
        alertmanagerMain:
          enableUserAlertmanagerConfig: true
      userWorkloadMonitoring:
        prometheus:
          retention: 15d
          storageClassName: gp3-csi
          volumeMode: Filesystem
          storageCapacity: 150Gi
        alertmanager:
          enabled: true
          enableAlertmanagerConfig: true
        thanosRuler:
          retention: 15d
          storageClassName: gp3-csi
          volumeMode: Filesystem
          storageCapacity: 75Gi
        prometheusOperator: {}
        remoteWrite:
          enabled: false
          url: https://metrics.example.com/api/v1/write
          secretName: prometheus-remote-write
  - name: internal-image-registry
    namespace: openshift-image-registry
    path: gitops/apps/platform/internal-image-registry
    syncWave: "30"
  - name: image-registry-allow-deny
    namespace: openshift-config
    path: gitops/apps/platform/image-registry-allow-deny
    syncWave: "40"
    helmValues: |
      registriesCertsConfigMap: registries-config-certs
      additionalTrustedCAs: {}
      allowList:
        - cp.icr.io
        - icr.io
        - quay.io
        - registry.redhat.io
        - registry.connect.redhat.com
        - image-registry.openshift-image-registry.svc:5000
        - ghcr.io
  - name: cluster-logging
    namespace: openshift-logging
    path: gitops/apps/platform/cluster-logging
    syncWave: "50"
  - name: namespace-onboarding
    namespace: openshift-config
    path: gitops/apps/platform/namespace-onboarding
    syncWave: "55"
    helmValues: |
      namespaces:
        - name: team-a-qa
          displayName: Team A QA
          description: Shared QA namespace for Team A
          labels:
            tenant: team-a
            environment: qa
          resourceQuota:
            name: team-a-quota
            hard:
              requests.cpu: "12"
              requests.memory: 24Gi
              limits.cpu: "24"
              limits.memory: 48Gi
              persistentvolumeclaims: "15"
          limitRange:
            name: team-a-defaults
            limits:
              - type: Container
                default:
                  cpu: "1"
                  memory: 2Gi
                defaultRequest:
                  cpu: 250m
                  memory: 512Mi
          networkPolicies:
            defaultDenyIngress: true
            defaultDenyEgress: true
            allowSameNamespaceIngress: true
            allowClusterDNS: true
          roleBindings:
            - group: team-a-developers
              role: edit
            - group: team-a-operators
              role: admin
  - name: identity-providers
    namespace: openshift-config
    path: gitops/apps/platform/identity-providers
    syncWave: "60"
  - name: groups-rbac
    namespace: openshift-config
    path: gitops/apps/platform/groups-rbac
    syncWave: "70"
  - name: vault-k8s-auth
    namespace: vault-auth
    path: gitops/apps/platform/vault-k8s-auth
    syncWave: "80"
  - name: oadp-operator
    namespace: openshift-adp
    path: gitops/apps/platform/oadp-operator
    syncWave: "90"
  - name: oadp-backup
    namespace: openshift-adp
    path: gitops/apps/platform/oadp-backup
    syncWave: "100"
    helmValues: |
      enabled: false
      namespace: openshift-adp
      backupMode: filesystem
      includeClusterResources: true
      schedules: []
  - name: oadp-restore
    namespace: openshift-adp
    path: gitops/apps/platform/oadp-restore
    syncWave: "110"
    helmValues: |
      enabled: false
      namespace: openshift-adp
      storageClassMapping: {}
      restores: []
  - name: cp4ba-operator
    namespace: cp4ba
    path: gitops/apps/workloads/cp4ba-operator
    syncWave: "200"
    helmValues: |
      namespace: cp4ba
      channel: v24.0
      subscriptionName: ibm-cp4a-operator
      packageName: ibm-cp4a-operator
      catalogSource:
        name: ibm-cp4a-operator-catalog
        namespace: openshift-marketplace
      installPlanApproval: Automatic
  - name: aap
    namespace: ansible-automation-platform
    path: gitops/apps/workloads/aap
    syncWave: "210"
    helmValues: |
      namespace: ansible-automation-platform
      subscription:
        name: ansible-automation-platform
        packageName: ansible-automation-platform-operator
        channel: stable-2.6
        installPlanApproval: Manual
        source: redhat-operators
        sourceNamespace: openshift-marketplace
      aap:
        enabled: true
        name: aap
        no_log: true
        image_pull_policy: IfNotPresent
        controller:
          disabled: false
          replicas: 2
          create_preload_data: true
          route_tls_termination_mechanism: Edge
          ingress_type: Route
          auto_upgrade: true
          task_privileged: false
          projects_persistence: false
          admin_user: admin
          ee_extra_env:
            - name: RECEPTOR_KUBE_SUPPORT_RECONNECT
              value: enabled
        hub:
          disabled: true
        eda:
          disabled: true
  - name: openshift-ai
    namespace: redhat-ods-operator
    path: gitops/apps/workloads/openshift-ai
    syncWave: "220"
    helmValues: |
      operator:
        namespace: redhat-ods-operator
        subscriptionName: rhods-operator
        packageName: rhods-operator
        channel: stable
        installPlanApproval: Manual
        source: redhat-operators
        sourceNamespace: openshift-marketplace
      dsci:
        enabled: true
        name: default-dsci
        applicationsNamespace: redhat-ods-applications
        monitoringNamespace: redhat-ods-monitoring
        serviceMeshManagementState: Removed
        trustedCABundle:
          managementState: Managed
          customCABundle: ""
      dsc:
        enabled: true
        name: default-dsc
        components:
          dashboard:
            managementState: Managed
          workbenches:
            managementState: Managed
          dataSciencePipelines:
            managementState: Managed
          modelmeshserving:
            managementState: Removed
          kserve:
            managementState: Removed
          codeflare:
            managementState: Removed
          ray:
            managementState: Removed
          trainingoperator:
            managementState: Removed
          kueue:
            managementState: Unmanaged
      dashboardConfig:
        enabled: true
        apiVersion: opendatahub.io/v1alpha
        kind: OdhDashboardConfig
        name: odh-dashboard-config
        namespace: redhat-ods-applications
        spec:
          dashboardConfig:
            disableAcceleratorProfiles: true
            disableHardwareProfiles: false
            disableDistributedWorkloads: false
            disablePipelines: false
            disableModelServing: false
