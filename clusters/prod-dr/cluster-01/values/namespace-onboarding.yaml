namespaces:
  - name: team-a-prod-dr
    displayName: Team A Production DR
    description: Shared disaster recovery namespace for Team A
    labels:
      tenant: team-a
      environment: prod-dr
      compliance-tier: regulated
    resourceQuota:
      name: team-a-quota
      hard:
        requests.cpu: "24"
        requests.memory: 64Gi
        limits.cpu: "48"
        limits.memory: 128Gi
        persistentvolumeclaims: "20"
        services.loadbalancers: "2"
    limitRange:
      name: team-a-defaults
      limits:
        - type: Container
          default:
            cpu: "2"
            memory: 4Gi
          defaultRequest:
            cpu: 250m
            memory: 512Mi
    networkPolicies:
      defaultDenyIngress: true
      defaultDenyEgress: true
      allowSameNamespaceIngress: true
      allowClusterDNS: true
    roleBindings:
      - group: team-a-operators
        role: admin
      - group: team-a-developers
        role: view
    features:
      serviceMesh:
        enabled: false
      openshiftAI:
        enabled: false
      cp4ba:
        enabled: false
      aap:
        enabled: false
tenantGitOps:
  enabled: false
  namespace: openshift-gitops-tenants
  instanceName: tenant-gitops
  globalSecretStoreRef:
    name: platform-secrets
    kind: ClusterSecretStore
  tenants:
    - name: team-a
      enabled: false
      projectName: team-a
      description: Shared tenant Argo CD project for Team A
      namespaces:
        - team-a-prod-dr
      sourceRepos:
        - https://github.com/your-org/team-a-apps.git
      allowApplicationSets: false
      groups:
        admins:
          - team-a-operators
        deployers:
          - team-a-developers
      repoCredentials:
        - name: team-a-apps
          url: https://github.com/your-org/team-a-apps.git
          externalSecret:
            name: team-a-apps-repo
            refreshInterval: 1h
            data:
              - secretKey: username
                remoteRef:
                  key: secret/data/tenants/team-a/git
                  property: username
              - secretKey: password
                remoteRef:
                  key: secret/data/tenants/team-a/git
                  property: password
