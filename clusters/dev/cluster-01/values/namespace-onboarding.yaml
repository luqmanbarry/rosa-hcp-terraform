namespaces:
  - name: team-a-dev
    displayName: Team A Development
    description: Shared development namespace for Team A
    labels:
      tenant: team-a
      environment: dev
    resourceQuota:
      name: team-a-quota
      hard:
        requests.cpu: "8"
        requests.memory: 16Gi
        limits.cpu: "16"
        limits.memory: 32Gi
        persistentvolumeclaims: "10"
    limitRange:
      name: team-a-defaults
      limits:
        - type: Container
          default:
            cpu: 500m
            memory: 1Gi
          defaultRequest:
            cpu: 100m
            memory: 256Mi
    networkPolicies:
      defaultDenyIngress: true
      allowSameNamespaceIngress: true
      allowClusterDNS: true
    roleBindings:
      - group: team-a-developers
        role: edit
      - group: team-a-operators
        role: admin
tenantGitOps:
  enabled: false
  namespace: openshift-gitops-tenants
  instanceName: tenant-gitops
  globalSecretStoreRef:
    name: platform-secrets
    kind: ClusterSecretStore
  tenants:
    - name: team-a
      enabled: false
      projectName: team-a
      description: Shared tenant Argo CD project for Team A
      namespaces:
        - team-a-dev
      sourceRepos:
        - https://github.com/your-org/team-a-apps.git
      allowApplicationSets: false
      groups:
        admins:
          - team-a-operators
        deployers:
          - team-a-developers
      repoCredentials:
        - name: team-a-apps
          url: https://github.com/your-org/team-a-apps.git
          externalSecret:
            name: team-a-apps-repo
            refreshInterval: 1h
            data:
              - secretKey: username
                remoteRef:
                  key: secret/data/tenants/team-a/git
                  property: username
              - secretKey: password
                remoteRef:
                  key: secret/data/tenants/team-a/git
                  property: password
